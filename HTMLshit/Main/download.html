<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download CCIV | SECURE ACCESS</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #050a05;
            color: #00ff6a;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* CRT scanline */
        body::before {
            content: "";
            display: block;
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.08) 0px,
                rgba(0,0,0,0.08) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 200;
        }

        #matrix {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.12;
        }

        /* ── CONTAINER ── */
        .container {
            position: relative;
            z-index: 10;
            width: 440px;
            background: rgba(0,0,0,0.92);
            border: 1px solid #00ff6a;
            box-shadow:
                0 0 0 1px rgba(0,255,106,0.15),
                0 0 30px rgba(0,255,106,0.2),
                inset 0 0 40px rgba(0,255,106,0.03);
            padding: 28px 32px 32px;
        }

        /* ── HEADER ── */
        .header {
            border-bottom: 1px solid rgba(0,255,106,0.3);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .header-tag {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(0,255,106,0.5);
            margin-bottom: 6px;
        }

        h2 {
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ff6a;
            text-shadow: 0 0 12px rgba(0,255,106,0.6);
            margin: 0 0 4px;
            animation: flicker 4s infinite;
        }

        .header-sub {
            font-size: 10px;
            color: rgba(0,255,106,0.4);
            letter-spacing: 2px;
        }

        @keyframes flicker {
            0%,100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.5; }
            94% { opacity: 1; }
            96% { opacity: 0.7; }
            97% { opacity: 1; }
        }

        /* ── META ROW ── */
        .meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(0,255,106,0.4);
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        /* ── BUTTON ROWS ── */
        .btn-row {
            margin-bottom: 10px;
        }

        .btn-row:last-child { margin-bottom: 0; }

        /* Base button */
        .dl-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            background: rgba(0,0,0,0.6);
            border-width: 1px;
            border-style: solid;
            border-radius: 2px;
            cursor: pointer;
            font-family: "Courier New", monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: background 0.15s, box-shadow 0.15s, color 0.15s;
            text-align: left;
        }

        .btn-label { flex: 1; }
        .btn-badge {
            font-size: 10px;
            letter-spacing: 2px;
            padding: 2px 7px;
            border-width: 1px;
            border-style: solid;
            border-radius: 1px;
            margin-left: 10px;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        /* GRAY — unsupported */
        .btn-gray {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }
        .btn-gray .btn-badge { border-color: #555; color: #555; }
        .btn-gray:hover { background: rgba(80,80,80,0.12); }

        /* YELLOW — available */
        .btn-yellow {
            border-color: #c8b400;
            color: #e8d000;
            text-shadow: 0 0 6px rgba(232,208,0,0.4);
        }
        .btn-yellow .btn-badge { border-color: #c8b400; color: #c8b400; }
        .btn-yellow:hover {
            background: rgba(200,180,0,0.12);
            box-shadow: 0 0 12px rgba(200,180,0,0.25);
            color: #ffe800;
        }

        /* GREEN — recommended */
        .btn-green {
            border-color: #00ff6a;
            color: #00ff6a;
            text-shadow: 0 0 6px rgba(0,255,106,0.4);
        }
        .btn-green .btn-badge {
            border-color: #00ff6a;
            color: #000;
            background: #00ff6a;
        }
        .btn-green:hover {
            background: rgba(0,255,106,0.1);
            box-shadow: 0 0 16px rgba(0,255,106,0.35);
        }

        /* ── SUB-VERSION (tweak) ── */
        .ver-wrapper { position: relative; }

        .sub-row {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.35s ease, opacity 0.25s ease, margin-top 0.3s ease;
            margin-top: 0;
        }

        .ver-wrapper:hover .sub-row {
            max-height: 60px;
            opacity: 1;
            margin-top: 6px;
        }

        .sub-btn {
            width: 90%;
            margin-left: 10%;
            font-size: 11px;
            padding: 8px 14px;
            position: relative;
        }

        .sub-btn::before {
            content: '';
            position: absolute;
            left: -14px;
            top: -6px;
            width: 10px;
            height: 26px;
            border-bottom: 1px solid #c8b400;
            border-left: 1px solid #c8b400;
            opacity: 0.6;
        }

        /* ── FOOTER ── */
        .footer {
            margin-top: 22px;
            padding-top: 14px;
            border-top: 1px solid rgba(0,255,106,0.15);
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: rgba(0,255,106,0.28);
            letter-spacing: 1.5px;
        }

        .pulse {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00ff6a;
            margin-right: 6px;
            vertical-align: middle;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; box-shadow: 0 0 4px #00ff6a; }
            50% { opacity: 0.3; box-shadow: none; }
        }
    </style>
</head>

<script>
    // Matrix rain
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*|:/!;?";
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff6a";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);

    function downloadFile(url) { window.location.href = url; }
</script>
